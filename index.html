  .card {

    flex-direction: column;
    gap: 8px;

  .thumbnail-wrap {
    position: relative;
    width: 100%;

    border-radius: 8px;
    overflow: hidden;
    background: #272727;
    transition: border-radius 0.15s;
  }

  .card:hover .thumbnail-wrap {
    border-radius: 0px;
  }

  .thumbnail-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
  }

  .card:hover .thumbnail-wrap img {
    transform: scale(1.04);
  }

  .duration {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(0,0,0,0.88);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 3px;
    letter-spacing: 0.02em;
  }

  .info {
    display: flex;
    gap: 9px;
    align-items: flex-start;
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
  }

  .meta {
    flex: 1;
    min-width: 0;
  }

  .video-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    color: #f1f1f1;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 4px;
    text-decoration: none;
    transition: color 0.15s;
  }

  .video-title:hover {
    color: #fff;
    text-decoration: underline;
  }

  .channel-name {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .video-date {
    font-size: 12px;
    color: #aaa;
  }

  @media (max-width: 900px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 600px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
</style>

// Helper functions to calculate duration
function parseDuration(durationStr) {
  const parts = durationStr.split(':').map(Number);
  if (parts.length === 2) {
    return parts[0] * 60 + parts[1]; // mm:ss to seconds
  } else if (parts.length === 3) {
    return parts[0] * 3600 + parts[1] * 60 + parts[2]; // hh:mm:ss to seconds
  }
  return 0;
}

function formatDuration(seconds) {
  const hours = Math.floor(seconds / 3600);
  const minutes = Math.floor((seconds % 3600) / 60);
  const secs = seconds % 60;
  return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

function calculateSectionStats(videos) {
  let totalSeconds = 0;
  videos.forEach(video => {
    totalSeconds += parseDuration(video.duration);
  });
  return {
    count: videos.length,
    duration: formatDuration(totalSeconds)
  };
}

function getInitials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function buildCard(video, delay) {
  return `
    <div class="card" style="animation-delay:${delay}s">
      <a href="https://www.youtube.com/watch?v=${video.id}" target="_blank" rel="noopener" style="text-decoration:none;">
        <div class="thumbnail-wrap">
          <img
            src="https://img.youtube.com/vi/${video.id}/maxresdefault.jpg"
            alt="${video.title}"
            onerror="this.src='https://img.youtube.com/vi/${video.id}/hqdefault.jpg'"

          <span class="duration">${video.duration}</span>
        </div>
      </a>

          <div class="video-date">${video.date}</div>
        </div>
      </div>
    </div>
  `;
}
